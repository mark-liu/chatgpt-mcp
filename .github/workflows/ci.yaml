name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: python -m py_compile chatgpt_mcp/__main__.py
      - run: python -m py_compile chatgpt_mcp/mcp_tools.py
      - run: python -m py_compile chatgpt_mcp/chatgpt_automation.py
      - run: python -c "import chatgpt_mcp; print('import OK')"
